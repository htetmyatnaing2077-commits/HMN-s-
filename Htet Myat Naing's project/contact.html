<html>
<head>
    <title>Anime World</title>
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
</head>

<body class="w3-light-blue">

<header>
    <div class="w3-bar w3-indigo w3-padding w3-xxlarge w3-center">
        <img src="images.jpg" style="width:150px;" class="w3-circle">
        <b>Anime World</b>
    </div>

    <nav class="w3-bar w3-blue">
        <a href="index.html" class="w3-bar-item w3-button">Home</a>
        <a href="about.html" class="w3-bar-item w3-button">About</a>
        <a href="contact.html" class="w3-bar-item w3-button">Contact</a>
    </nav>
</header>

<div class="w3-container w3-padding-32">

    <h2>Contact Us</h2>

    <p>
        Have a favorite anime to recommend? We'd love to hear from you!
    </p>

    <form class="w3-card w3-padding w3-white">

        <label>Name</label>
        <input class="w3-input w3-border" type="text">

        <br>

        <label>Email</label>
        <input class="w3-input w3-border" type="email">

        <br>

        <label>Favorite Anime</label>
        <input class="w3-input w3-border" type="text">

        <br>

        <label>Message</label>
        <textarea class="w3-input w3-border"></textarea>

        <br>

        <button class="w3-button w3-green">
            Send Message
        </button>

    </form>

</div>

<footer class="w3-indigo w3-padding w3-center">
    <h4>©2026 Anime World</h4>
</footer>

</body>
</html>
